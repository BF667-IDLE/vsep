<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Sound wave bars forming a V shape -->
  <!-- Left side -->
  <rect x="136" y="200" width="20" height="112" rx="10" fill="url(#wave)" opacity="0.5"/>
  <rect x="168" y="168" width="20" height="176" rx="10" fill="url(#wave)" opacity="0.65"/>
  <rect x="200" y="136" width="20" height="240" rx="10" fill="url(#wave)" opacity="0.8"/>
  <!-- Center bottom -->
  <rect x="232" y="192" width="20" height="128" rx="10" fill="url(#wave)" opacity="0.9"/>
  <!-- Center -->
  <rect x="264" y="128" width="20" height="256" rx="10" fill="url(#wave)"/>
  <!-- Right side -->
  <rect x="296" y="160" width="20" height="192" rx="10" fill="url(#wave)" opacity="0.8"/>
  <rect x="328" y="192" width="20" height="128" rx="10" fill="url(#wave)" opacity="0.65"/>
  <rect x="360" y="216" width="20" height="80" rx="10" fill="url(#wave)" opacity="0.5"/>

  <!-- Text: vsep -->
  <text x="256" y="420" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="80" font-weight="600" fill="#f1f5f9" letter-spacing="8">vsep</text>
</svg>
