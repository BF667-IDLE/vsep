# vsep Project Configuration
# This is NOT a package - use requirements.txt for dependencies

[tool.black]
line-length = 140
target-version = ['py310', 'py311', 'py312', 'py313']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --cov=separator --cov-report=term-missing"
filterwarnings = [
    "ignore:stft with return_complex=False is deprecated:UserWarning",
    "ignore:'audioop' is deprecated:DeprecationWarning",
]
